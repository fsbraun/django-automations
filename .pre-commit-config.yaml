repos:
- repo: https://github.com/pycqa/isort
  rev: 9.0.0a3
  hooks:
    - id: isort
      name: isort (python)
- repo: https://github.com/psf/black-pre-commit-mirror
  rev: 26.3.1
  hooks:
  - id: black
    language_version: python3.12
- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
    - id: flake8
- repo: https://github.com/rtts/djhtml
  rev: 3.0.11
  hooks:
    - id: djhtml
